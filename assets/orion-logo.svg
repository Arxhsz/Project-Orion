<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Project Orion logo</title>
  <desc id="desc">Project Orion wordmark with a luminous globe, orbital paths, and dark glass command panel styling.</desc>
  <defs>
    <radialGradient id="spaceGlow" cx="38%" cy="42%" r="76%">
      <stop offset="0" stop-color="#1b3f52" stop-opacity="0.88"/>
      <stop offset="0.42" stop-color="#0c1722" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#03050a"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="30%" r="76%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#94f0ff"/>
      <stop offset="0.42" stop-color="#168ec1"/>
      <stop offset="0.74" stop-color="#0a3754"/>
      <stop offset="1" stop-color="#031622"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#18222d" stop-opacity="0.97"/>
      <stop offset="0.5" stop-color="#070b12" stop-opacity="0.99"/>
      <stop offset="1" stop-color="#121a25" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#7fdcff" stop-opacity="0.2"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#61f5b3" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-25%" width="120%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1120" height="360" rx="36" fill="#03050a"/>
  <rect x="28" y="28" width="1064" height="304" rx="30" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16" filter="url(#shadow)"/>
  <rect x="28" y="28" width="1064" height="304" rx="30" fill="url(#spaceGlow)"/>
  <g transform="translate(171 180)">
    <circle r="86" fill="url(#earth)" stroke="#ffffff" stroke-opacity="0.62" stroke-width="2.5"/>
    <path d="M-52-18C-28-48 21-59 62-38C36-31 16-18 7 4C-18 2-37-6-52-18Z" fill="#59d39f" opacity="0.72"/>
    <path d="M-18 36C7 21 48 27 64 52C36 69 4 64-18 36Z" fill="#5bc985" opacity="0.68"/>
    <path d="M-78 18C-43 28-4 27 35 14C57 7 73 3 82 6" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M-72-34C-28-18 22-19 70-36" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>
    <path d="M0-86C22-50 30-15 24 21C19 51 8 72 0 86" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="2"/>
    <path d="M-92-6C-33-82 91-72 126 9" fill="none" stroke="#8ee8ff" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>
    <path d="M-128-9C-82 93 72 101 129 10" fill="none" stroke="#62f5b6" stroke-opacity="0.34" stroke-width="3" stroke-linecap="round"/>
    <circle cx="116" cy="5" r="6" fill="#62f5b6" filter="url(#glow)"/>
    <circle cx="-96" cy="-2" r="4" fill="#ffffff" opacity="0.9"/>
    <path d="M0-116V116M-116 0H116" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>
  </g>
  <g fill="#ffffff" font-family="Inter, Arial, sans-serif">
    <text x="328" y="127" font-size="22" font-weight="800" letter-spacing="11" opacity="0.52">ORBITAL INTELLIGENCE</text>
    <text x="328" y="198" font-size="69" font-weight="900" letter-spacing="2">PROJECT ORION</text>
    <text x="332" y="242" font-size="20" font-weight="700" letter-spacing="3" opacity="0.62">REALTIME PLANETARY COMMAND MAP</text>
  </g>
  <path d="M328 269H986" stroke="url(#line)" stroke-width="2" stroke-linecap="round"/>
  <g transform="translate(914 105)">
    <rect x="-16" y="-20" width="114" height="40" rx="20" fill="#0d151e" stroke="#ffffff" stroke-opacity="0.16"/>
    <circle cx="5" cy="0" r="7" fill="#62f5b6" filter="url(#glow)"/>
    <text x="24" y="6" fill="#ffffff" fill-opacity="0.72" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">LIVE</text>
  </g>
</svg>
